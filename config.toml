baseURL = "https://logycoco.xyz/" # <head> 里面的 baseurl 信息，填你的博客地址
title = "logycoconut`s blog" # 浏览器的标题
languageCode = "zh-cn" # 语言
hasCJKLanguage = true # 开启可以让「字数统计」统计汉字
theme = "LeaveIt"

paginate = 12
enableEmoji = true
enableRobotsTXT = true
googleAnalytics = "" # Google 统计 id
preserveTaxonomyNames = true

toc = true                # 是否开启目录
autoCollapseToc = true   # Auto expand and collapse toc

[blackfriday]
    hrefTargetBlank = true
    nofollowLinks = true
    noreferrerLinks = true

[Permalinks]
    posts = "/:year/:filename/"
 
[menu]
    [[menu.main]]
        name = "Blog"
        url = "/posts/"
        weight = 1
    [[menu.main]]
        name = "Categories"
        url = "/categories/"
        weight = 2
    [[menu.main]]
        name = "Tags"
        url = "/tags/"
        weight = 3
    [[menu.main]]
        name = "About"
        url = "/about/"
        weight = 4

[params]
    since  = 2018
    author = "logycoconut"                     # Author's name
    avatar = "images/me/avatar.png"           # Author's avatar
    subtitle = "Learning Brings Pleasure🙂"    # Subtitle
    cdn_url  = ""                              # Base CDN URL
    home_mode = "" # post or other

    enableGitalk = true # gitalk 评论系统

    google_verification = ""
    description = "" # (Meta) 描述
    keywords = "" # site keywords

    beian = "浙ICP备19046357号"
